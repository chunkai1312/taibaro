<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <circle cx="16" cy="16" r="16" fill="#0F172A"/>

  <!-- Gauge track (dim arc as rail) -->
  <path d="M5,21 A11,11 0 0,1 27,21"
        fill="none" stroke="#1E293B" stroke-width="3.5"/>

  <!-- 5-color gauge bands (center 16,21 r=11, 5×36°) -->
  <path d="M5,21 A11,11 0 0,1 7.1,14.3"
        fill="none" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
  <path d="M7.1,14.3 A11,11 0 0,1 12.6,10.5"
        fill="none" stroke="#38BDF8" stroke-width="3" stroke-linecap="round"/>
  <path d="M12.6,10.5 A11,11 0 0,1 19.4,10.5"
        fill="none" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
  <path d="M19.4,10.5 A11,11 0 0,1 24.9,14.3"
        fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
  <path d="M24.9,14.3 A11,11 0 0,1 27,21"
        fill="none" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>

  <!-- Spark line as needle: originates from pivot (16,21), zigzags upward,
       tip lands on the arc at Bull zone ~54° ≈ (22,12) -->
  <polyline points="16,21 13,18 17,15.5 14,13 22,12"
            fill="none" stroke="#EF4444" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tip dot on arc -->
  <circle cx="22" cy="12" r="1.3" fill="#EF4444"/>

  <!-- Pivot -->
  <circle cx="16" cy="21" r="2.2"
          fill="#0F172A" stroke="#F1F5F9" stroke-width="0.8"/>
</svg>
