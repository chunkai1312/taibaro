<mat-card class="kline-card">
  <div class="card-header">
    <ng-content select="[cardTitle]">
      <span class="card-title">加權指數 K 線</span>
    </ng-content>
    <div class="header-controls">
      <div class="interval-buttons">
        <button class="range-btn" [class.active]="chartInterval() === 'D'" (click)="setChartInterval('D')">日K</button>
        <button class="range-btn" [class.active]="chartInterval() === 'W'" (click)="setChartInterval('W')">週K</button>
      </div>
      <div class="range-buttons">
        @for (r of ranges(); track r) {
          <button class="range-btn" [class.active]="localRange() === r" (click)="setLocalRange(r)">{{ r }}</button>
        }
      </div>
    </div>
  </div>
  <div class="ma-bar">
    @for (def of maDefs; track def.period; let i = $index) {
      <span class="ma-item" [style.color]="def.color">
        MA{{ def.period }}: {{ displayMaValues()[i] ?? '—' }}
      </span>
    }
  </div>
  <mat-card-content>
    <div class="chart-content">
      <app-indicator-chart
        [option]="chartOption()"
        height="400px"
        (chartGlobalout)="resetHover()"
      ></app-indicator-chart>
    </div>
  </mat-card-content>
</mat-card>
