@if (stats(); as s) {
  <div class="stats-grid">
    <app-stat-card
      label="外資買賣超"
      [value]="s.finiNetBuySell ? +(s.finiNetBuySell / 1e8).toFixed(1) : null"
      [change]="s.finiNetBuySell ? +(s.finiNetBuySell / 1e8).toFixed(1) : null"
      unit="億"
      [decimals]="2"
    ></app-stat-card>

    <app-stat-card
      label="投信買賣超"
      [value]="s.sitcNetBuySell ? +(s.sitcNetBuySell / 1e8).toFixed(1) : null"
      [change]="s.sitcNetBuySell ? +(s.sitcNetBuySell / 1e8).toFixed(1) : null"
      unit="億"
      [decimals]="2"
    ></app-stat-card>

    <app-stat-card
      label="自營商買賣超"
      [value]="s.dealersNetBuySell ? +(s.dealersNetBuySell / 1e8).toFixed(1) : null"
      [change]="s.dealersNetBuySell ? +(s.dealersNetBuySell / 1e8).toFixed(1) : null"
      unit="億"
      [decimals]="2"
    ></app-stat-card>

    <app-stat-card
      label="外資台指淨未平倉"
      [value]="s.finiTxfNetOi"
      [change]="s.finiTxfNetOi"
      unit="口"
    ></app-stat-card>

    <app-stat-card
      label="外資選擇權淨未平倉"
      [value]="s.finiTxoNetOiValue ? +(s.finiTxoNetOiValue / 1e5).toFixed(2) : null"
      [change]="s.finiTxoNetOiValue ? +(s.finiTxoNetOiValue / 1e5).toFixed(2) : null"
      unit="億"
      [decimals]="2"
    ></app-stat-card>

    <app-stat-card
      label="散戶微台淨未平倉"
      [value]="s.retailTmfNetOi"
      [change]="s.retailTmfNetOi"
      unit="口"
    ></app-stat-card>
  </div>
} @else {
  <div class="stats-empty">載入中...</div>
}
