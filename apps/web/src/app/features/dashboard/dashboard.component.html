<div class="dashboard">
  <!-- 晴雨表 Hero Card -->
  <section class="section">
    <app-barometer-hero
      [data]="barometerData()"
      [todayStats]="todayStats()"
      [loading]="barometerLoading()"
      [error]="barometerError()"
    ></app-barometer-hero>
  </section>

  <!-- 今日籌碼速覽 -->
  <section class="section">
    <h2 class="section-title">今日籌碼速覽</h2>
    <app-stats-overview [stats]="todayStats()"></app-stats-overview>
  </section>

  <!-- 趨勢圖表 -->
  <section class="section">
    <h2 class="section-title">籌碼指標趨勢</h2>
    <app-chart-tab-group [data]="marketStatsData()"></app-chart-tab-group>
  </section>
</div>
