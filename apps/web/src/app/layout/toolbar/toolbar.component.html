<mat-toolbar class="app-toolbar">
  <img src="favicon.svg" class="logo" alt="TaiBaro logo" />
  <span class="title">TaiBaro</span>

  <!-- 頁面導覽 -->
  <nav class="nav-links">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">大盤籌碼</a>
    <a routerLink="/sector-flow" routerLinkActive="active" class="nav-link">資金流向</a>
  </nav>

  <span class="spacer"></span>

  <!-- 日期導航 -->
  <div class="date-nav">
    <button mat-icon-button (click)="prevDay()" aria-label="前一日">
      <mat-icon>chevron_left</mat-icon>
    </button>

    <!-- 日期顯示 + 點擊開啟 datepicker -->
    <button class="date-display" (click)="picker.open()" mat-button>
      <mat-icon class="cal-icon">calendar_today</mat-icon>
      <span>{{ selectedDateStr() }}</span>

      <!-- 隱藏的 datepicker 輸入 -->
      <input
        [matDatepicker]="picker"
        [value]="selectedDateObj()"
        [max]="maxDate"
        (dateChange)="onDatePickerChange($event.value)"
        style="display:none"
      />
      <mat-datepicker #picker></mat-datepicker>
    </button>

    <button
      mat-icon-button
      (click)="nextDay()"
      [disabled]="isToday()"
      aria-label="後一日"
    >
      <mat-icon>chevron_right</mat-icon>
    </button>
  </div>

  <!-- 主題切換 -->
  <button mat-icon-button (click)="themeService.toggle()" [attr.aria-label]="isDark() ? '切換淺色模式' : '切換深色模式'">
    <mat-icon>{{ isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</mat-toolbar>
<!-- 提供 MatNativeDateModule 令 datepicker 正常運作 -->
